reference:
  - title: "Core - Lake Class"
    desc: "Main R6 class for versioned data management"
    contents:
      - Lake
      - lake_exists
      - lake_status
      - lake_doctor
      - lake_repair

  - title: "Version Control"
    desc: "Snapshots, tags, and time travel"
    contents:
      - snap
      - tag
      - restore
      - history
      - tree
      - ref

  - title: "Query & Operators"
    desc: "Query builder and custom operators"
    contents:
      - QueryBuilder
      - sql
      - from
      - query
      - starts_with("%")
      - is_null
      - is_not_null
      - starts_with_str
      - ends_with_str
      - contains_str
      - coalesce
      - if_else_na

  - title: "dplyr Integration"
    desc: "Use dplyr verbs with OmicsLake tables"
    contents:
      - save_as
      - into

  - title: "Lineage & Observe"
    desc: "Lightweight lineage tracking and pipeline recording"
    contents:
      - observe
      - observe_session
      - observe_to_lake
      - wrap_call
      - mark
      - link
      - unlink_dep
      - deps
      - create_pipeline

  - title: "Adapters"
    desc: "Type-specific storage adapters for Bioconductor containers"
    contents:
      - LakeAdapter
      - SEAdapter
      - register_adapter
      - get_adapters
      - find_adapter

  - title: "Shortcuts"
    desc: "Convenience functions for the default lake"
    contents:
      - use_lake
      - lake
      - put
      - fetch
      - drop
      - tables
      - objects
      - import_data
      - export_data

  - title: "Legacy API"
    desc: "Backward-compatible ol_* functions"
    contents:
      - starts_with("ol_")

