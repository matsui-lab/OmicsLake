name: publish-public-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (default: current ref name)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AUTHOR_NAME: Yusuke Matsui
      AUTHOR_EMAIL: matsui.yusuke.d4@f.mail.nagoya-u.ac.jp
      PUBLIC_BRANCH: main
      PUSH: "1"

    steps:
      - name: Validate mirror configuration
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_REPO_SLUG: ${{ vars.PUBLIC_REPO_SLUG }}
        run: |
          test -n "${PUBLIC_REPO_TOKEN}" || (echo "Missing secret: PUBLIC_REPO_TOKEN" && exit 1)
          test -n "${PUBLIC_REPO_SLUG}" || (echo "Missing variable: PUBLIC_REPO_SLUG (example: matsui-lab/OmicsLake)" && exit 1)

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Publish release snapshot to public repository
        env:
          PUBLIC_REPO_URL: https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/${{ vars.PUBLIC_REPO_SLUG }}.git
        run: |
          RELEASE_TAG_INPUT="${{ inputs.release_tag }}"
          if [[ -n "${RELEASE_TAG_INPUT}" ]]; then
            export RELEASE_TAG="${RELEASE_TAG_INPUT}"
          else
            export RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          bash tools/public/publish_release_to_public.sh
